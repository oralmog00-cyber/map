<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מירוץ מבוך רשת - בית מרס</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #canvas { display: block; margin: 0 auto; background: #000; }
        #video { position: absolute; bottom: 10px; left: 10px; width: 160px; height: 120px; border: 2px solid #fff; border-radius: 8px; transform: scaleX(-1); z-index: 5; }
        #status { position: absolute; top: 10px; right: 10px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; z-index: 10; min-width: 200px; }
        #winner-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        #winner-canvas { border: 5px solid #ffd700; border-radius: 50%; width: 200px; height: 200px; margin-bottom: 20px; background: #333; }
        #restart-btn { padding: 12px 24px; font-size: 18px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>
<body>

    <div id="status">טוען מפות ומודלים...</div>
    <canvas id="canvas"></canvas>
    <video id="video" autoplay muted playsinline></video>

    <div id="winner-screen">
        <h1 style="font-size: 48px; color: #ffd700; margin-bottom: 10px;">🏆 יש לנו מנצח! 🏆</h1>
        <canvas id="winner-canvas" width="150" height="150"></canvas>
        <h2 id="winner-text" style="font-size: 28px;">השחקן הגיע לבית מרס וניצח!</h2>
        <button id="restart-btn" onclick="resetGame()">סיבוב חדש 🔄</button>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');
const statusDiv = document.getElementById('status');
const winnerScreen = document.getElementById('winner-screen');
const winnerCanvas = document.getElementById('winner-canvas');
const winnerText = document.getElementById('winner-text');

canvas.width = 980;
canvas.height = 735;

function resizeCanvas() {
    const scale = Math.min(window.innerWidth / canvas.width, window.innerHeight / canvas.height);
    canvas.style.width = (canvas.width * scale) + 'px';
    canvas.style.height = (canvas.height * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);

const mapBackground = new Image();
mapBackground.src = 'מפה בית מרס.jpg'; 

let people = [];
let isCooldown = false;
let gameOver = false;
let playerCount = 0;

const playerColors = ['#3498db', '#2ecc71', '#f1c40f', '#e74c3c', '#9b59b6', '#e67e22'];

// 📍 רשת נקודות מדויקת על קווי התכלת #5ec7f2
const nodes = {
    'guri_start': { x: 620, y: 720, neighbors: ['guri_1'] },
    'guri_1': { x: 622, y: 690, neighbors: ['guri_start', 'guri_2'] },
    'guri_2': { x: 625, y: 655, neighbors: ['guri_1', 'guri_3', 'guld_1'] },
    'guri_3': { x: 623, y: 620, neighbors: ['guri_2', 'guri_4'] },
    'guri_4': { x: 610, y: 585, neighbors: ['guri_3', 'haj_ini_square'] },
    
    'guld_1': { x: 660, y: 670, neighbors: ['guri_2', 'guld_2'] },
    'guld_2': { x: 700, y: 685, neighbors: ['guld_1', 'guld_end'] },
    'guld_end': { x: 725, y: 692, neighbors: ['guld_2'] },

    'haj_ini_square': { x: 590, y: 550, neighbors: ['guri_4', 'hakran_1', 'keshet_r1'] },

    'hakran_1': { x: 585, y: 515, neighbors: ['haj_ini_square', 'hakran_2'] },
    'hakran_2': { x: 580, y: 475, neighbors: ['hakran_1', 'nofim_1'] },
    'nofim_1': { x: 595, y: 445, neighbors: ['hakran_2', 'nofim_2'] },
    'nofim_2': { x: 610, y: 415, neighbors: ['nofim_1', 'highway_junction'] },

    'keshet_r1': { x: 550, y: 542, neighbors: ['haj_ini_square', 'keshet_r2'] },
    'keshet_r2': { x: 515, y: 532, neighbors: ['keshet_r1', 'keshet_b1'] },
    'keshet_b1': { x: 495, y: 560, neighbors: ['keshet_r2', 'keshet_b2'] },
    'keshet_b2': { x: 480, y: 590, neighbors: ['keshet_b1', 'keshet_b3'] },
    'keshet_b3': { x: 465, y: 612, neighbors: ['keshet_b2', 'keshet_l1'] },
    'keshet_l1': { x: 440, y: 600, neighbors: ['keshet_b3', 'keshet_l2'] },
    'keshet_l2': { x: 423, y: 570, neighbors: ['keshet_l1', 'keshet_l3'] },
    'keshet_l3': { x: 418, y: 540, neighbors: ['keshet_l2', 'keshet_t1'] },
    'keshet_t1': { x: 428, y: 505, neighbors: ['keshet_l3', 'keshet_t2'] },
    'keshet_t2': { x: 448, y: 475, neighbors: ['keshet_t1', 'keshet_t3'] },
    'keshet_t3': { x: 472, y: 452, neighbors: ['keshet_t2', 'highway_junction'] },

    'highway_junction': { x: 495, y: 380, neighbors: ['nofim_2', 'keshet_t3', 'highway_1'] },
    'highway_1': { x: 490, y: 350, neighbors: ['highway_junction', 'highway_2'] },
    'highway_2': { x: 475, y: 310, neighbors: ['highway_1', 'highway_3'] },
    'highway_3': { x: 460, y: 270, neighbors: ['highway_2', 'highway_4'] },
    'highway_4': { x: 445, y: 225, neighbors: ['highway_3', 'highway_5'] },
    'highway_5': { x: 428, y: 180, neighbors: ['highway_4', 'highway_turn'] },
    
    'highway_turn': { x: 380, y: 130, neighbors: ['highway_5', 'mars_str_1'] },
    'mars_str_1': { x: 335, y: 124, neighbors: ['highway_turn', 'mars_str_2'] },
    'mars_str_2': { x: 285, y: 118, neighbors: ['mars_str_1', 'mars_str_3'] },
    'mars_str_3': { x: 230, y: 112, neighbors: ['mars_str_2', 'mars_str_4'] },
    'mars_str_4': { x: 185, y: 106, neighbors: ['mars_str_3', 'mars_target'] },
    
    'mars_target': { x: 135, y: 85, neighbors: ['mars_str_4'] } 
};

async function init() {
    resizeCanvas();
    statusDiv.innerText = "טוען מודלים של AI...";
    
    // בדיקה בטוחה ש-faceapi אכן קיים ונטען בזיכרון
    if (typeof faceapi === 'undefined') {
        setTimeout(init, 200); // אם עדיין לא נטען, ננסה שוב בעוד 200 מילישניות
        return;
    }

    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    statusDiv.innerText = "מתחבר למצלמה...";
    startVideo();
}

function startVideo() {
    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
        .then(stream => {
            video.srcObject = stream;
            video.addEventListener('play', () => {
                statusDiv.innerText = "🎮 מוכן! עמדו מול המצלמה והעיגולים ירוצו לאורך נתיב התכלת.";
                animate();
                detectFaceLoop();
            });
        })
        .catch(err => statusDiv.innerText = "שגיאה בגישה למצלמה: " + err.message);
}

async function detectFaceLoop() {
    if (video.paused || video.ended || gameOver) return;
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.1 }));

    if (detection) {
        const box = detection.box;
        if (box.width > 130 && !isCooldown) {
            triggerCapture(box);
        }
    }
    setTimeout(detectFaceLoop, 100);
}

function triggerCapture(faceBox) {
    isCooldown = true;
    statusDiv.innerText = "📸 נועל פנים... הישאר יציב.";
    statusDiv.style.background = "#e67e22"; 

    setTimeout(() => {
        captureAndAddNewPlayer();
    }, 500);
}

async function captureAndAddNewPlayer() {
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.1 }));
    if (!detection) {
        statusDiv.innerText = "❌ הלכידה נכשלה. נסה שוב.";
        statusDiv.style.background = "rgba(0,0,0,0.8)";
        isCooldown = false;
        return;
    }

    const faceBox = detection.box;
    playerCount++;
    const playerColor = playerColors[(playerCount - 1) % playerColors.length];

    const faceCanvas = document.createElement('canvas');
    faceCanvas.width = 150;
    faceCanvas.height = 150;
    const fCtx = faceCanvas.getContext('2d');
    const pad = faceBox.width * 0.15;
    
    fCtx.drawImage(video, faceBox.x - pad, faceBox.y - pad, faceBox.width + (pad*2), faceBox.height + (pad*2), 0, 0, 150, 150);

    const faceImage = new Image();
    faceImage.src = faceCanvas.toDataURL('image/png');

    const startNodes = ['guri_start', 'guld_end', 'keshet_b3'];
    const randomStart = startNodes[Math.floor(Math.random() * startNodes.length)];

    people.push({
        id: playerCount,
        face: faceImage,
        color: playerColor,
        currentNode: randomStart,
        targetNode: nodes[randomStart].neighbors[Math.floor(Math.random() * nodes[randomStart].neighbors.length)],
        x: nodes[randomStart].x,
        y: nodes[randomStart].y,
        speed: 1.3 + Math.random() * 0.5, 
        visited: [randomStart]
    });

    statusDiv.innerText = "🏃‍♂️ שחקן " + playerCount + " זינק למסלול!";
    statusDiv.style.background = playerColor;

    setTimeout(() => {
        if(!gameOver) {
            statusDiv.innerText = "🎮 המשחק פעיל! עמדו מול המצלמה להוספת שחקנים.";
            statusDiv.style.background = "rgba(0,0,0,0.8)";
        }
        isCooldown = false;
    }, 3000);
}

function declareWinner(player) {
    gameOver = true;
    winnerText.innerText = "שחקן " + player.id + " הגיע ראשון לבית מרס וניצח!";
    winnerText.style.color = player.color;
    const wCtx = winnerCanvas.getContext('2d');
    wCtx.clearRect(0, 0, 150, 150);
    wCtx.drawImage(player.face, 0, 0, 150, 150);
    winnerScreen.style.display = 'flex';
}

function resetGame() {
    people = [];
    playerCount = 0;
    gameOver = false;
    winnerScreen.style.display = 'none';
    statusDiv.innerText = "🎮 משחק חדש החל! מי יקלוט את בית מרס ראשון?";
    statusDiv.style.background = "rgba(0,0,0,0.8)";
    detectFaceLoop();
}

function animate() {
    if (gameOver) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (mapBackground.complete) {
        ctx.drawImage(mapBackground, 0, 0, canvas.width, canvas.height);
    }

    const goalNode = nodes['mars_target'];
    ctx.beginPath();
    ctx.arc(goalNode.x, goalNode.y, 22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(231, 76, 60, 0.25)';
    ctx.fill();
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 3;
    ctx.stroke();

    people.forEach((person) => {
        const target = nodes[person.targetNode];
        if (target) {
            const dx = target.x - person.x;
            const dy = target.y - person.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > 4) {
                person.x += (dx/dist) * person.speed;
                person.y += (dy/dist) * person.speed;
            } else {
                if (person.targetNode === 'mars_target') {
                    declareWinner(person);
                    return;
                }
                
                person.currentNode = person.targetNode;
                const currentNeighbors = nodes[person.currentNode].neighbors;
                
                let unvisited = currentNeighbors.filter(n => !person.visited.includes(n));
                if (unvisited.length === 0) {
                    person.visited = [person.currentNode];
                    unvisited = currentNeighbors;
                }
                
                person.targetNode = unvisited[Math.floor(Math.random() * unvisited.length)];
                person.visited.push(person.targetNode);
                if(person.visited.length > 10) person.visited.shift();
            }
        }

        const circleRadius = 24; 
        ctx.save();
        ctx.translate(person.x, person.y);
        ctx.beginPath();
        ctx.arc(0, 0, circleRadius, 0, Math.PI * 2);
        ctx.clip();
        if (person.face.complete) {
            ctx.scale(-1, 1);
            ctx.drawImage(person.face, -circleRadius, -circleRadius, circleRadius * 2, circleRadius * 2);
        }
        ctx.restore();
        
        ctx.beginPath();
        ctx.arc(person.x, person.y, circleRadius, 0, Math.PI * 2);
        ctx.strokeStyle = person.color;
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = 'white';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("P" + person.id, person.x, person.y - (circleRadius + 6));
    });

    requestAnimationFrame(animate);
}

// מחכים שחלון הדפדפן וכל הסקריפטים החיצוניים ייטענו באופן סופי ומלא
window.onload = () => {
    init();
};
</script>
</body>
</html>
